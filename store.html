<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store — Thomas Russo</title>
  <meta name="description" content="A new book by Thomas Russo. Coming 2026." />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Navigation ──────────────────────────────────────── -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Thomas Russo</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="store.html" class="active">Store</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- ─── Store Hero ───────────────────────────────────────── -->
  <section class="store-hero">
    <div class="store-inner">

      <div class="store-badge">
        <span class="store-badge-dot"></span>
        <span class="store-badge-text">Coming Soon &nbsp;·&nbsp; 2026</span>
      </div>

      <p class="store-eyebrow">A New Work by Thomas Russo</p>

      <h1 class="store-heading">A Book<br>Is Coming</h1>

      <div class="store-rule"></div>

      <p class="store-description">
        A new work is in progress. Details to follow.
      </p>

      <p class="store-year">2026</p>

    </div>
  </section>

  <!-- ─── Footer ───────────────────────────────────────────── -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-name">Thomas Russo</span>
        <span class="footer-location">Howell, New Jersey</span>
        <span class="footer-copy">&copy; 2026 Thomas Russo. All rights reserved.</span>
      </div>
      <a href="https://www.instagram.com/thomasrussoesquire/" class="footer-instagram" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      links.classList.toggle('open');
      toggle.classList.toggle('open');
    });
  </script>

</body>
</html>
